# German Eiland - Voice Client-Plugin Konfiguration.
#
# Installationsort auf Windows:
# %APPDATA%\Mumble\Mumble\Plugins\eiland_voice.ini
#
# Die meisten Spieler brauchen nur server_host und server_port.

# Dein Eiland-Bridge / Falloff-Server-Host.
server_host=eiland.shibajr.de

# TCP-Port des Eiland-Falloff-Servers.
server_port=8890

# Muss mit falloff_server.api_key auf der Server-Bridge übereinstimmen.
api_key=ShibaExile123

# 1 = Plugin aktiv, 0 = installiert aber inaktiv.
enabled=1

# 1 = Schreibt eiland_voice.log neben die Plugin-DLL.
debug_log=1

# Gain-Glättung. Höher ist weicher, reagiert aber langsamer.
smoothing=0.80

# Stereo-Pan-Glättung. Höher ist weicher, reagiert aber langsamer.
pan_smoothing=0.95

# Sekunden zwischen Wiederverbindungsversuchen, wenn die Bridge offline ist.
reconnect_sec=8
